openapi: 3.1.0
info:
  title: API BDesk
  description: |
    # API de Gerenciamento de Serviços BDesk

    API REST para integração com a plataforma BDesk (BusinessDesk), um sistema ITSM/service-desk empresarial.

    ## Principais recursos

    * **Requisições**: Abrir, consultar, filtrar e executar ações em requisições de serviço
    * **Itens de Configuração (ICs)**: Consultar ativos, componentes, associações e listas de papéis
    * **Catálogo de Serviços**: Navegar formulários, atividades e itens de seleção
    * **Autenticação**: Autenticação via bearer token (JWT)

    ## Autenticação

    Todos os endpoints (exceto login) requerem autenticação via bearer token.
    O token é obtido via `POST /v1/login/entrar`.

    > **Atenção:** O endpoint de login retorna `RetornoApi<T>` (não `RetornoApiRest<T>`).
    > O campo `Dados` contém uma **string JSON escapada** — é necessário fazer `JSON.parse(response.Dados)` para extrair o token.

    ## Formato de Resposta

    A maioria dos endpoints usa o envelope `RetornoApiRest<T>`:
    ```json
    {
      "_metadata": { "Release": "...", "MensagensErro": [], "LogAmigavel": [] },
      "records": [ ... ]
    }
    ```

    Erros de negócio retornam HTTP **406** com `_metadata.MensagensErro` preenchido.
  version: 2.0.0
  contact:
    email: suporte@bdesk.com.br
    name: Suporte BDesk
    url: https://herocorp.bdesk.com.br

servers:
  - url: https://{cliente}.bdesk.com.br/askrest
    description: Produção
    variables:
      cliente:
        default: herocorp
        description: Subdomínio do cliente
  - url: https://{cliente}.bdesk.com.br/askrest-qa
    description: QA / Homologação
    variables:
      cliente:
        default: herocorp
  - url: https://{cliente}.bdesk.com.br/askrest-dev
    description: Desenvolvimento
    variables:
      cliente:
        default: herocorp
  - url: http://localhost:{porta}/api
    description: Desenvolvimento local
    variables:
      porta:
        default: "44378"

security:
  - bearerAuth: []

tags:
  - name: Usuários e Autenticação
    description: Login, dados do usuário autenticado e licenciamento
  - name: Requisições
    description: Abertura, consulta, ações, histórico e anexos de requisições
  - name: Catálogo
    description: Catálogo de serviços (formulários, atividades, itens de seleção)
  - name: Configuração
    description: Itens de configuração (ICs), consultas dinâmicas e listas de papéis

# ============================================================================
# PATHS
# ============================================================================

paths:

  # --------------------------------------------------------------------------
  # Usuários e Autenticação — LoginController, UsuariosController
  # --------------------------------------------------------------------------

  /v1/login/entrar:
    post:
      tags: [Usuários e Autenticação]
      summary: Autenticar usuário
      description: |
        Autentica um usuário e retorna um bearer token.

        > **Atenção:** Este endpoint usa `RetornoApi<T>` (não `RetornoApiRest<T>`).
        > O campo `Dados` contém uma **string JSON escapada**. É necessário fazer
        > `JSON.parse(response.Dados)` para extrair o objeto com `access_token`.
      operationId: entrar
      security: []
      x-source-controller: LoginController.Entrar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticação bem-sucedida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiLogin'
              example:
                Dados: '"{\"access_token\":\"eyJhbGci...\"}"'
                LogAmigavel: []
                MensagensErro: []
                Versao: "9.8.0"
        '406':
          description: Erro de negócio (credenciais inválidas, usuário bloqueado)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiLogin'

  /v1/login/EntrarApp:
    post:
      tags: [Usuários e Autenticação]
      summary: Autenticar via app mobile
      description: |
        Autentica usando um token temporário obtido via autenticação mobile.
        Valida o token temporário via SHA256 e gera um bearer token permanente.
      operationId: entrarApp
      security: []
      x-source-controller: LoginController.EntrarApp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [access_token]
              properties:
                access_token:
                  type: string
                  description: Token temporário obtido via autenticação mobile
      responses:
        '200':
          description: Token validado e novo bearer token gerado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiObject'

  /v1/usuarios/me:
    get:
      tags: [Usuários e Autenticação]
      summary: Dados básicos do usuário autenticado
      description: |
        Retorna dados básicos do usuário autenticado (id, login, nome).

        > **Nota:** Este endpoint retorna um objeto direto (sem envelope `RetornoApiRest`).
      operationId: dadosUsuarioAutenticado
      x-source-controller: UsuariosController.DadosUsuarioAutenticado
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioVM'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/usuarios/perfil:
    get:
      tags: [Usuários e Autenticação]
      summary: Perfil detalhado do usuário autenticado
      description: Retorna perfil completo com empresa, cargo, superiores hierárquicos e dados de contato.
      operationId: detalhesDadosUsuarioAutenticado
      x-source-controller: UsuariosController.DetalhesDadosUsuarioAutenticado
      responses:
        '200':
          description: Perfil detalhado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestPerfilUsuario'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/usuarios/licenca:
    get:
      tags: [Usuários e Autenticação]
      summary: Obter licença (GET — redirecionamento)
      description: |
        Este endpoint GET é intencionalmente desabilitado. Retorna uma mensagem
        orientando o uso do método POST. Oculto do Swagger.
      operationId: obterLicencaGet
      x-source-controller: UsuariosController.ObterLicencaGet
      responses:
        '200':
          description: Mensagem de redirecionamento para POST
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestString'
    post:
      tags: [Usuários e Autenticação]
      summary: Gerar/validar licença
      description: |
        Gera ou valida uma licença do sistema BDesk. Oculto do Swagger.
        Requer que a empresa de instalação seja válida.
      operationId: obterLicenca
      x-source-controller: UsuariosController.ObterLicenca
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DadosLicencaVM'
      responses:
        '200':
          description: Licença gerada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestString'
        '406':
          $ref: '#/components/responses/ErroNegocio'

  # --------------------------------------------------------------------------
  # Requisições — RequisicoesController
  # --------------------------------------------------------------------------

  /v1/requisicoes:
    get:
      tags: [Requisições]
      summary: Dashboard de requisições
      description: Retorna contadores de requisições abertas e encerradas com URLs de navegação.
      operationId: dashboard
      x-source-controller: RequisicoesController.Dashboard
      responses:
        '200':
          description: Resumo do dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/abertas:
    get:
      tags: [Requisições]
      summary: Listar requisições abertas
      description: Retorna lista paginada de requisições abertas com filtros via query string.
      operationId: requisicoesAbertas
      x-source-controller: RequisicoesController.RequisicoesAbertas
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          description: Lista de requisições abertas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestRequisicoes'
        '401':
          $ref: '#/components/responses/NaoAutorizado'
    post:
      tags: [Requisições]
      summary: Listar requisições abertas (filtro POST)
      description: Variante POST para filtros avançados no corpo da requisição.
      operationId: requisicoesAbertasPost
      x-source-controller: RequisicoesController.RequisicoesAbertasPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiltrosRequisicoes'
      responses:
        '200':
          description: Lista de requisições abertas filtradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestRequisicoes'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/encerradas:
    get:
      tags: [Requisições]
      summary: Listar requisições encerradas
      description: Retorna lista paginada de requisições encerradas.
      operationId: requisicoesEncerradas
      x-source-controller: RequisicoesController.RequisicoesEncerradas
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/PageNumber'
      responses:
        '200':
          description: Lista de requisições encerradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestRequisicoes'
        '401':
          $ref: '#/components/responses/NaoAutorizado'
    post:
      tags: [Requisições]
      summary: Listar requisições encerradas (filtro POST)
      description: Variante POST para filtros avançados.
      operationId: requisicoesEncerradasPost
      x-source-controller: RequisicoesController.RequisicoesEncerradasPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiltrosRequisicoes'
      responses:
        '200':
          description: Lista de requisições encerradas filtradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestRequisicoes'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/porcondicao/{condicao}/{quantidade}:
    post:
      tags: [Requisições]
      summary: Requisições por condição
      description: Retorna requisições filtradas por uma condição específica com limite de quantidade.
      operationId: obterRequisicoesByCondicao
      x-source-controller: RequisicoesController.ObterRequisicoesByCondicao
      parameters:
        - name: condicao
          in: path
          required: true
          schema:
            type: string
          description: Condição de filtro
        - name: quantidade
          in: path
          required: true
          schema:
            type: integer
          description: Quantidade máxima de resultados
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiltrosRequisicoesSimples'
      responses:
        '200':
          description: Requisições filtradas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestRequisicoes'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/busca:
    post:
      tags: [Requisições]
      summary: Busca avançada de requisições
      description: Pesquisa avançada com filtros complexos. Usa DaoCom para busca integrada.
      operationId: buscaRequisicoes
      x-source-controller: RequisicoesController.BuscaRequisicoes
      parameters:
        - name: maximoPorSituacao
          in: query
          required: false
          schema:
            type: integer
            default: 100
          description: Máximo de resultados por situação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMFiltrosRequisicoesAvancado'
      responses:
        '200':
          description: Resultados da busca
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/{requisicao}:
    get:
      tags: [Requisições]
      summary: Detalhes da requisição
      description: Retorna detalhes completos de uma requisição com dados organizados em conjuntos e URLs de navegação.
      operationId: detalhes
      x-source-controller: RequisicoesController.Detalhes
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      responses:
        '200':
          description: Detalhes da requisição
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequisicoesDetalhesVM'
        '401':
          $ref: '#/components/responses/NaoAutorizado'
        '406':
          $ref: '#/components/responses/ErroNegocio'

  /v1/requisicoes/{requisicao}/dado-dominio-detalhado:
    get:
      tags: [Requisições]
      summary: Detalhes com dados de domínio
      description: Retorna detalhes da requisição incluindo dados de domínio detalhados.
      operationId: detalhesRequisicaoDadoDominio
      x-source-controller: RequisicoesController.DetalhesRequisicaoDadoDominio
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      responses:
        '200':
          description: Detalhes com domínio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequisicoesDetalhesVM'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/{requisicao}/historico:
    get:
      tags: [Requisições]
      summary: Histórico da requisição
      description: Retorna o histórico de ações e eventos da requisição.
      operationId: historico
      x-source-controller: RequisicoesController.Historico
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      responses:
        '200':
          description: Histórico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestGenerico'
        '401':
          $ref: '#/components/responses/NaoAutorizado'
    post:
      tags: [Requisições]
      summary: Histórico filtrado
      description: Retorna histórico filtrado com critérios no corpo da requisição.
      operationId: historicoPost
      x-source-controller: RequisicoesController.HistoricoPost
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FiltrosHistorico'
      responses:
        '200':
          description: Histórico filtrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestGenerico'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/{requisicao}/anexos:
    get:
      tags: [Requisições]
      summary: Listar anexos
      description: Retorna todos os anexos de uma requisição. Nota — rota usa plural `/anexos`.
      operationId: anexos
      x-source-controller: RequisicoesController.Anexos
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      responses:
        '200':
          description: Lista de anexos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestGenerico'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/{requisicao}/anexo:
    post:
      tags: [Requisições]
      summary: Anexar arquivo
      description: |
        Faz upload de um arquivo como anexo da requisição.
        Nota — rota usa singular `/anexo` (diferente do GET que usa `/anexos`).
      operationId: anexo
      x-source-controller: RequisicoesController.Anexo
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload concluído
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadVM'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/Upload:
    post:
      tags: [Requisições]
      summary: Upload genérico de arquivo
      description: Upload de arquivo avulso (sem associar a uma requisição específica na URL).
      operationId: upload
      x-source-controller: RequisicoesController.Upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload concluído
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadVM'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/{requisicao}/acoes:
    get:
      tags: [Requisições]
      summary: Ações disponíveis
      description: Lista as ações disponíveis para o usuário autenticado na requisição especificada.
      operationId: acoesDoUsuarioNaRequisicao
      x-source-controller: RequisicoesController.AcoesDoUsuarioNaRequisicao
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      responses:
        '200':
          description: Ações disponíveis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestGenerico'
        '401':
          $ref: '#/components/responses/NaoAutorizado'
    post:
      tags: [Requisições]
      summary: Executar ação
      description: |
        Executa uma ação de workflow na requisição.
        Ver [Guia de Ações de Workflow](guides/workflow-actions.md) para códigos e parâmetros.
      operationId: executarAcao
      x-source-controller: RequisicoesController.ExecutarAcao
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMExecutarAcaoApi'
      responses:
        '200':
          description: Ação executada
          content:
            application/json:
              schema:
                type: object
        '406':
          $ref: '#/components/responses/ErroNegocio'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/{requisicao}/acoes/DIR/grupos:
    get:
      tags: [Requisições]
      summary: Grupos disponíveis para direcionar
      description: Lista os grupos possíveis como destino da ação DIR (Direcionar).
      operationId: possiveisSolicitadosAcaoDirecionar
      x-source-controller: RequisicoesController.PossiveisSolicitadosAcaoDirecionar
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      responses:
        '200':
          description: Grupos disponíveis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestGenerico'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/{requisicao}/dadosadicionais:
    get:
      tags: [Requisições]
      summary: Dados adicionais da requisição
      description: Retorna os conjuntos de dados adicionais preenchidos na requisição.
      operationId: dadosAdicionais
      x-source-controller: RequisicoesController.DadosAdicionais
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      responses:
        '200':
          description: Dados adicionais
          content:
            application/json:
              schema:
                type: object
                properties:
                  ConjuntosDadosAdicionais:
                    type: object
                  MensagensErro:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/NaoAutorizado'
    post:
      tags: [Requisições]
      summary: Editar dados adicionais
      description: Atualiza os dados adicionais de uma requisição.
      operationId: editarDadosAdicionais
      x-source-controller: RequisicoesController.EditarDadosAdicionais
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: object
                additionalProperties: true
              description: 'Mapa de conjuntos → campos → valores'
      responses:
        '200':
          description: Dados atualizados
          content:
            application/json:
              schema:
                type: object
        '406':
          $ref: '#/components/responses/ErroNegocio'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/{requisicao}/vinculadas:
    get:
      tags: [Requisições]
      summary: Requisições vinculadas
      description: Retorna as requisições vinculadas à requisição especificada.
      operationId: requisicoesVinculadas
      x-source-controller: RequisicoesController.RequisicoesVinculadas
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      responses:
        '200':
          description: Requisições vinculadas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestGenerico'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/{requisicao}/pesquisasatisfacao:
    get:
      tags: [Requisições]
      summary: Pesquisa de satisfação
      description: Retorna a pesquisa de satisfação disponível para a requisição.
      operationId: pesquisaSatisfacao
      x-source-controller: RequisicoesController.PesquisaSatisfacao
      parameters:
        - $ref: '#/components/parameters/RequisicaoId'
      responses:
        '200':
          description: Dados da pesquisa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PesquisaVM'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/requisicoes/responderpesquisasatisfacao:
    post:
      tags: [Requisições]
      summary: Responder pesquisa de satisfação
      description: Submete a resposta de uma pesquisa de satisfação.
      operationId: responderPesquisaSatisfacao
      x-source-controller: RequisicoesController.ResponderPesquisaSatisfacao
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PesquisaRespondida'
      responses:
        '200':
          description: Resposta registrada
          content:
            application/json:
              schema:
                type: string
        '406':
          $ref: '#/components/responses/ErroNegocio'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  # --- Abertura de Requisições ---

  /v1/requisicoes/abrir:
    post:
      tags: [Requisições]
      summary: Abrir requisição (retorno simples)
      description: |
        Cria uma nova requisição e retorna apenas o ID da requisição criada como string.
      operationId: abrirRequisicao
      x-source-controller: RequisicoesController.AbrirRequisicao
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMAbrirRequisicao'
      responses:
        '200':
          description: ID da requisição criada
          content:
            application/json:
              schema:
                type: string
              example: "12345"
