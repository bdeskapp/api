  /v1/cardapio/portal:
    get:
      tags: [Catálogo]
      summary: Categorias do portal
      description: |
        Retorna categorias do catálogo de serviços filtradas pelos grupos de acesso
        do usuário autenticado, enriquecidas com metadados de tags e sessões de
        navegação. Inclui categorias explícitas e inferidas. Recomendado para
        portais e navegação self-service.

        **Breaking change:** O campo `Id` é string (não integer). Categorias
        inferidas usam IDs compostos `"idCategoria-idSessao"`.
      operationId: portalCategorias
      x-source-controller: CardapioController.Portal
      responses:
        '200':
          description: Categorias do portal filtradas por grupos de acesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  _metadata:
                    $ref: '#/components/schemas/Metadata'
                  records:
                    type: array
                    items:
                      type: object
                      properties:
                        Id:
                          type: string
                          description: "Explícitas: Id numérico como string. Inferidas: 'idCategoria-idSessao'"
                          example: "1"
                        Nome:
                          type: string
                          example: "Suporte de TI"
                        Imagem:
                          type: string
                          nullable: true
                        Tipo:
                          type: string
                          enum: [explicita, inferida]
                          example: "explicita"
                        Favorito:
                          type: boolean
                          example: false
                        Tags:
                          type: array
                          items:
                            type: string
                          example: ["tag_3", "tag_7"]
                        NomesTags:
                          type: array
                          items:
                            type: string
                          example: ["Infraestrutura", "Hardware"]
                        Itens:
                          type: array
                          items:
                            type: object
                            properties:
                              Id:
                                type: integer
                                format: int64
                              Nome:
                                type: string
                              URL:
                                type: string
              example:
                _metadata:
                  Release: "9.8.0"
                  LogAmigavel:
                    - "Buscando grupos de acesso do usuário"
                    - "Buscando categorias explícitas"
                    - "Buscando categorias inferidas"
                    - "Buscando tags de navegação"
                    - "Enriquecendo categorias com metadados de tags"
                  MensagensErro: []
                records:
                  - Id: "1"
                    Nome: "Suporte de TI"
                    Imagem: null
                    Tipo: "explicita"
                    Favorito: false
                    Tags: ["tag_3", "tag_7"]
                    NomesTags: ["Infraestrutura", "Hardware"]
                    Itens:
                      - Id: 101
                        Nome: "Solicitação de Suporte de PC"
                        URL: "https://sua-empresa.bdesk.com.br/askrest/v1/cardapio/101"
                  - Id: "12-5"
                    Nome: "Categoria Inferida X"
                    Imagem: null
                    Tipo: "inferida"
                    Favorito: false
                    Tags: ["sessao_2"]
                    NomesTags: ["Processos Internos"]
                    Itens: []
        '401':
          $ref: '#/components/responses/NaoAutorizado'

