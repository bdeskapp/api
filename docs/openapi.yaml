          description: Listas de papéis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestListaIcVM'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

# ============================================================================
# COMPONENTS
# ============================================================================

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token obtido via POST /v1/login/entrar

  # --- Reusable Parameters ---

  parameters:
    PageSize:
      name: pageSize
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 20
      description: Itens por página
    PageNumber:
      name: pageNumber
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Número da página (1-indexed)
    RequisicaoId:
      name: requisicao
      in: path
      required: true
      schema:
        type: integer
      description: ID da requisição
    IcId:
      name: ic
      in: path
      required: true
      schema:
        type: integer
      description: ID do item de configuração
    ListaId:
      name: lista
      in: path
      required: true
      schema:
        type: integer
      description: ID da lista de papéis

  # --- Reusable Responses ---

  responses:
    NaoAutorizado:
      description: Token ausente ou inválido
      content:
        application/json:
          schema:
            type: object
            properties:
              _metadata:
                $ref: '#/components/schemas/Metadata'
    ErroNegocio:
      description: Erro de negócio (ver MensagensErro)
      content:
        application/json:
          schema:
            type: object
            properties:
              _metadata:
                $ref: '#/components/schemas/Metadata'

  # --- Schemas ---

  schemas:

    # --- Envelopes de Resposta ---

    Metadata:
      type: object
      properties:
        Release:
          type: string
        MensagensErro:
          type: array
          items:
            type: string
        LogAmigavel:
          type: array
          items: {}

    RetornoApiLogin:
      type: object
      description: |
        Envelope de resposta do login (RetornoApi<T>).
        **Atenção:** `Dados` é uma string JSON escapada, não um objeto direto.
      properties:
        Dados:
          type: string
          description: String JSON escapada contendo o token. Requer JSON.parse() para extrair.
        LogAmigavel:
          type: array
          items: {}
        MensagensErro:
          type: array
          items:
            type: string
        Versao:
          type: string

    RetornoApiObject:
      type: object
      description: Envelope RetornoApi<object>
      properties:
        Dados:
          type: object
        LogAmigavel:
          type: array
          items: {}
        MensagensErro:
          type: array
          items:
            type: string
        Versao:
          type: string

    RetornoApiRestGenerico:
      type: object
      description: Envelope padrão RetornoApiRest<T> com records genéricos.
      properties:
        _metadata:
          $ref: '#/components/schemas/Metadata'
        records:
          type: array
          items: {}

    RetornoApiRestString:
      type: object
      properties:
        _metadata:
          $ref: '#/components/schemas/Metadata'
        records:
          type: array
          items:
            type: string

    RetornoApiRestRequisicoes:
      type: object
      properties:
        _metadata:
          $ref: '#/components/schemas/Metadata'
        records:
          type: array
          items:
            type: object

    RetornoApiRestPerfilUsuario:
      type: object
      properties:
        _metadata:
          $ref: '#/components/schemas/Metadata'
        records:
          type: array
          items:
            type: object
            properties:
              usuarioId:
                type: integer
              login:
                type: string
              dominio:
                type: string
              nome:
                type: string
              ramal:
                type: string
              email:
                type: string
              perfilId:
                type: integer
              perfilNome:
                type: string
              empresaId:
                type: integer
              empresaNome:
                type: string
              cargoId:
                type: integer
              cargoNome:
                type: string
              superiorHierarquicoId:
                type: integer
              superiorHierarquicoNome:
                type: string
              superiorHierarquicoEmail:
                type: string

    RetornoApiRestAreaVM:
      type: object
      properties:
        _metadata:
          $ref: '#/components/schemas/Metadata'
        records:
          type: array
          items:
            $ref: '#/components/schemas/AreaVM'

    RetornoApiRestIcVM:
      type: object
      properties:
        _metadata:
          $ref: '#/components/schemas/Metadata'
        records:
          type: array
          items:
            $ref: '#/components/schemas/IcVM'

    RetornoApiRestValor:
      type: object
      properties:
        _metadata:
          $ref: '#/components/schemas/Metadata'
        records:
          type: array
          items:
            $ref: '#/components/schemas/Valor'

    RetornoApiRestListaIcVM:
      type: object
      properties:
        _metadata:
          $ref: '#/components/schemas/Metadata'
        records:
          type: array
          items:
            $ref: '#/components/schemas/ListaIcVM'

    # --- Domain Models ---

    LoginRequest:
      type: object
      required: [Login, Senha]
      properties:
        Login:
          type: string
          description: Nome de usuário
        Senha:
          type: string
          description: Senha do usuário
        Dominio:
          type: string
          description: Domínio de autenticação (opcional)

    UsuarioVM:
      type: object
      description: Dados básicos do usuário (retornado sem envelope)
      properties:
        id:
          type: integer
        login:
          type: string
        nome:
          type: string

    DadosLicencaVM:
      type: object
      properties:
        DataVencimento:
          type: string
          format: date-time
          nullable: true

    DashboardResponse:
      type: object
      properties:
        Abertas:
          type: integer
        Encerradas:
          type: integer
        UrlRequisicoesAbertas:
          type: string
        UrlRequisicoesEncerradas:
          type: string

    FiltrosRequisicoes:
      type: object
      description: Filtros para listagem de requisições
      properties:
        RequisicaoId:
          type: integer
          nullable: true
        AtividadeId:
          type: integer
          nullable: true
        DescricoesStatus:
          type: array
          items:
            type: string
        GruposSolucionadores:
          type: array
          items:
            type: integer
        AbertoEntre:
          $ref: '#/components/schemas/IntervaloDatas'
        EncerradoEntre:
          $ref: '#/components/schemas/IntervaloDatas'
        Assunto:
          type: string
        IdsFormularios:
          type: array
          items:
            type: integer
        LimiteRequisicoes:
          type: integer
          default: 500
        DadosAdicionais:
          type: object
          description: Mapa aninhado de filtros por dado adicional
          additionalProperties:
            type: object
            additionalProperties:
              $ref: '#/components/schemas/WMFiltroDadoAdicional'

    FiltrosRequisicoesSimples:
      type: object
      description: Filtros simplificados para requisições por condição
      properties:
        Ids:
          type: array
          items:
            type: integer
        DescricaoOuAssunto:
          type: string

    VMFiltrosRequisicoesAvancado:
      type: object
      description: Filtros avançados para busca de requisições
      properties:
        Requisicao:
          type: integer
          nullable: true
        Area:
          type: integer
          nullable: true
        Formulario:
          type: object
          properties:
            Id:
              type: integer
              nullable: true
            Dados:
              type: array
              items:
                type: object
                properties:
                  idDadCon:
                    type: integer
                  tpDado:
                    type: integer
                  valor:
                    type: array
                    items:
                      type: string
        DadosAdicionais:
          type: array
          items:
            type: object
            properties:
              DadoAdicionalId:
                type: integer
                nullable: true
              Valor:
                type: array
                items: {}
              ValorParcial:
                type: array
                items: {}
        Categoria:
          type: integer
          nullable: true
        Subcategoria:
          type: integer
          nullable: true
        Tarefa:
          type: integer
          nullable: true
        Localizacao:
          type: integer
          nullable: true
        Assunto:
          type: string
        AbertasDesde:
          type: string
          format: date-time
          nullable: true
        AbertasAte:
          type: string
          format: date-time
          nullable: true
        EncerradasDesde:
          type: string
          format: date-time
          nullable: true
        EncerradasAte:
          type: string
          format: date-time
          nullable: true
        UltimaAcaoExecutada_Id:
          type: string
        UltimaAcaoExecutada_Desde:
          type: string
          format: date-time
          nullable: true
        UltimaAcaoExecutada_Ate:
          type: string
          format: date-time
          nullable: true
        Solicitantes:
          type: array
          items:
            $ref: '#/components/schemas/FiltroParticipante'
        Solicitados:
          type: array
          items:
            $ref: '#/components/schemas/FiltroParticipante'
        Responsaveis:
          type: array
          items:
            $ref: '#/components/schemas/FiltroParticipante'
        Beneficiados:
          type: array
          items:
            $ref: '#/components/schemas/FiltroParticipante'
        Registradores:
          type: array
          items:
            $ref: '#/components/schemas/FiltroParticipante'
        ICs:
          type: array
          items:
            $ref: '#/components/schemas/FiltroParticipante'

    FiltrosHistorico:
      type: object
      description: Filtros para histórico da requisição
      properties:
        IdAcao:
          type: array
          items:
            type: integer
        IdFrmAcao:
          type: array
          items:
            type: integer
        CdAcao:
          type: array
          items:
            type: string

    RequisicoesDetalhesVM:
      type: object
      description: |
        Detalhes completos de uma requisição. Retornado diretamente (sem envelope RetornoApiRest).
        O campo Conjuntos é um dicionário (não array): chave = nome da seção, valor = campos com valores.
      properties:
        Conjuntos:
          type: object
          description: |
            Dados da requisição organizados por seção. Estrutura:
            `{ "Detalhes Do Pedido": { "Assunto": "...", "Status": "..." }, "Agendamento do Pedido": { ... }, "Participantes": { ... }, "IdsParticipantes": { "REG": { "IdTipoPapel": 1, "IdParticipante": 123 } } }`
          additionalProperties: true
        UrlDadosAdicionais:
          type: string
        UrlAcoes:
          type: string
        UrlHistorico:
          type: string
        UrlRequisicoesVinculadas:
          type: string
        MensagensErro:
          type: array
          items:
            type: string

    RequisicaoListItem:
      type: object
      description: Registro de requisição retornado nas listagens (abertas, encerradas, busca)
      properties:
        RequisicaoId:
          type: integer
          description: ID da requisição
        Assunto:
          type: string
        Status:
          type: string
          description: Descrição do status (ex. "Em Andamento", "Aberta", "Encerrada")
        FormularioId:
          type: integer
        AtividadeId:
          type: integer
          nullable: true
        FormularioStatusId:
          type: integer
        ProcessoId:
          type: integer
          nullable: true
        DescricaoAtividade:
          type: string
        DescricaoRequisicao:
          type: string
        DescricaoRotinaOuFormulario:
          type: string
        UltimaAcao:
          type: string
        UltimaAcaoQuando:
          type: string
          format: date-time
        UltimaAcaoQuem:
          type: string
        Solicitante:
          type: string
        Solicitado:
          type: string
        Beneficiado:
          type: string
        Responsavel:
          type: string
        DataAbertura:
          type: string
          format: date-time
        DataInicioPrevisto:
          type: string
          format: date-time
        DataFim:
          type: string
          format: date-time
          nullable: true
        DataFimPrevisto:
          type: string
          format: date-time
          nullable: true
        DataInicioReal:
          type: string
          format: date-time
          nullable: true
        DataFimReal:
          type: string
          format: date-time
          nullable: true
        GrupoAtualId:
          type: integer
          nullable: true
        FlagSLA:
          type: string
        UrlDetalhesRequisicao:
          type: string
        UrlHistoricoRequisicao:
          type: string

    AtividadeListItem:
      type: object
      description: Atividade retornada pela listagem de atividades de um formulário (resposta do controller é objeto anônimo)
      properties:
        Id:
          type: integer
          description: ID da atividade (mapeado de AtividadeId)
        Nome:
          type: string
          description: Nome da atividade (mapeado de Descricao)
        Descricao:
          type: string
          nullable: true
          description: Descrição completa (mapeado de DescricaoCompleta)
        FlagDocumento:
          type: boolean
        DescricaoAlertaDoc:
          type: string
          description: Alerta sobre documentação obrigatória
        Categoria:
          type: object
          properties:
            Id:
              type: integer
        SubCategoria:
          type: object
          properties:
            Id:
              type: integer
        Grupos:
          type: array
          description: Grupos solucionadores disponíveis para esta atividade
          items:
            type: object
            properties:
              Id:
                type: integer
                description: GrupoId
              Nome:
                type: string
                description: DescricaoDoGrupo
              SLA:
                type: integer
                description: SLA em horas

    VMExecutarAcaoApi:
      type: object
      description: Dados para execução de uma ação de workflow
      required: [Id]
      properties:
        Id:
          type: string
          description: Identificador da ação no formato "Nome [CODIGO]" (ex. "Encerrar [ENC]")
        Descricao:
          type: string
          description: Descrição/comentário da ação
        prioridade:
          type: integer
          format: int16
          nullable: true
          description: Nova prioridade (usado com ALTPRI)
        ConjuntosDadosAdicionais:
          type: object
          description: Dados adicionais para atualizar junto com a ação
          additionalProperties:
            type: object
            additionalProperties: true
        IdRequisicaoAVincular:
          type: integer
          nullable: true
          description: ID da requisição a vincular (usado com VINC)
        Data:
          type: string
          description: Data da ação
        Motivo:
          type: integer
          format: int16
          nullable: true
          description: ID do motivo (usado com ENC)
        NovoSolicitado:
          type: string
          description: ID do novo solicitado (usado com DIR)
        DescricaoRequisicao:
          type: string
          description: Nova descrição da requisição (usado com ALTDES)
        AssuntoRequisicao:
          type: string
          description: Novo assunto (usado com ALTDES)
        AtividadeId:
          type: integer
          nullable: true
          description: Nova atividade (usado com RECAT)
        GrupoId:
          type: integer
          nullable: true
          description: Novo grupo de atendimento (usado com DIR)
        DataFimPrevisto:
          type: string
          description: Nova data de fim previsto
        ManterGrupo:
          type: boolean
          nullable: true
          description: Se deve manter o grupo atual (usado com DIR)

    VMAbrirRequisicao:
      type: object
      description: |
        Dados para abertura de requisição.
        O campo `Formulario` é o ID do formulário (não confundir com IdFormulario).
        Os dados do formulário são passados via `Conjuntos`, um dicionário
        cujas chaves são os nomes dos conjuntos e os valores são os campos preenchidos.
      required: [Formulario]
      properties:
        Formulario:
          type: integer
          description: ID do formulário (FormularioId)
        Conjuntos:
          type: object
          description: |
            Dados do formulário organizados por conjunto.
            Chave: nome do conjunto (ex. "DadosBasicos").
            Valor: objeto com chave do campo → valor preenchido.
          additionalProperties: true

    VMAbrirRequisicaoViaPortal:
      type: object
      description: |
        Dados para abertura de requisição via portal (catálogo).
        Usa IdItemCardapio em vez de Formulario.
      required: [IdItemCardapio]
      properties:
        IdItemCardapio:
          type: integer
          format: int64
          description: ID do item do catálogo (cardápio)
        IdRascunho:
          type: integer
          format: int64
          description: ID do rascunho (0 se não houver)
        Conjuntos:
          type: object
          description: |
            Dados organizados por conjunto. Estrutura:
            `{ "NomeConjunto": [{ "ChaveCampo": valor, ... }] }`
            O valor é um array de objetos (mesmo para conjuntos não-múltiplos).
          additionalProperties:
            type: array
            items:
              type: object
              additionalProperties: true

    DesdobrarRequisicaoVM:
      type: object
      description: Dados para desdobramento de requisição. Herda de VMAbrirRequisicao.
      allOf:
        - $ref: '#/components/schemas/VMAbrirRequisicao'
        - type: object
          properties:
            IdRequisicaoADesdobrar:
              type: integer
              nullable: true
              description: ID da requisição original a ser desdobrada

    UploadVM:
      type: object
      properties:
        Id:
          type: integer
        MensagensErro:
          type: array
          items:
            type: string

    PesquisaVM:
      type: object
      description: Dados da pesquisa de satisfação
      properties:
        PossuiPesquisa:
          type: boolean
        Perguntas:
          type: array
          items:
            $ref: '#/components/schemas/PerguntaDataContract'
        Requisicao:
          type: string
        ReqDescricao:
          type: string
        ResponderMaisDeUmaVez:
          type: boolean
        Anonima:
          type: boolean
        PesquisaJaRespondida:
          type: boolean

    PesquisaRespondida:
      type: object
      description: Resposta da pesquisa de satisfação
      properties:
        IdRequisicao:
          type: integer
        Respostas:
          type: array
          items:
            type: object
            properties:
              IdPergunta:
                type: integer
              IdOpcao:
                type: integer
                nullable: true
              Motivo:
                type: string
              RespostaDescritiva:
                type: string
              RespostaComentario:
                type: string
              UsuarioSeAbsteve:
                type: boolean
                nullable: true

    AreaVM:
      type: object
      properties:
        Id:
          type: integer
        Nome:
          type: string
        Formularios:
          type: array
          items:
            type: object
            properties:
              Id:
                type: integer
              Nome:
                type: string
              Versao:
                type: string
              PrazoMinimoDeAtendimento:
                type: integer
                description: Prazo mínimo de atendimento (em horas)
              Origens:
                type: array
                nullable: true
                description: Origens disponíveis para o formulário
                items:
                  type: object
                  properties:
                    Id:
                      type: integer
                    Nome:
                      type: string
              Url:
                type: string
                description: URL para obter detalhes do formulário

    FormularioVM:
      type: object
      description: |
        Detalhes do formulário retornado por GET /v1/cardapio/formularios/{formulario}.
        ATENÇÃO: Este endpoint remove o campo `Apresentacao` de todos os campos (OcultarCampoApresentacao).
        Para renderização dinâmica, use GET /v1/cardapio/{id} que preserva Apresentacao.
      properties:
        Id:
          type: integer
        Nome:
          type: string
        Versao:
          type: string
        PrazoMinimoDeAtendimento:
          type: integer
        UrlAtividades:
          type: string
          description: URL para listar atividades do formulário
        AbrirRequisicao:
          type: string
          description: URL para abrir requisição com este formulário
        DesdobrarRequisicao:
          type: string
          description: URL para desdobrar requisição
        Conjuntos:
          type: array
          description: Conjuntos de campos do formulário (mesclados)
          items:
            $ref: '#/components/schemas/ConjuntoCampos'

    DadosDoFormulario:
      type: object
      description: |
        Dados completos do formulário com campos. Retornado pelo endpoint
        GET /v1/cardapio/formularios/{formulario}/atividades/{atividade}.
        Nota: NÃO contém ObjAtividade — apenas ObjFormulario e Conjuntos.
      properties:
        ObjFormulario:
          $ref: '#/components/schemas/Formulario'
        Conjuntos:
          type: array
          description: Conjuntos de campos do formulário (mesclados com a atividade)
          items:
            $ref: '#/components/schemas/ConjuntoCampos'

    Formulario:
      type: object
      description: Objeto completo do formulário (template de serviço)
      properties:
        FormularioId:
          type: integer
          description: ID do formulário
        Descricao:
          type: string
          description: Descrição curta do formulário
        DescricaoCompleta:
          type: string
          nullable: true
          description: Descrição completa (longa)
        DescricaoParaAnexarDocumentos:
          type: string
          nullable: true
          description: Instrução para upload de documentos
        Nome:
          type: string
          description: Nome interno do formulário
        AreaId:
          type: integer
          nullable: true
          description: ID da área organizacional
        PrazoMinimo:
          type: integer
          description: Prazo mínimo de atendimento (em horas)
        ProcessoId:
          type: integer
        RotinaId:
          type: integer
        HasOrigem:
          type: boolean
          description: Se o formulário tem origens configuradas
        IsCategorizado:
          type: boolean
          description: Se requer categorização por atividade
        IsExpansivel:
          type: boolean
        IsOffline:
          type: boolean
        AbreArea:
          type: boolean
          nullable: true
        AtividadeId:
          type: string
          description: ID da atividade padrão (string, pode ser "0")
        GrupoAdmin:
          type: object
          nullable: true
          description: Grupo administrador do formulário
        TipoRotina:
          type: string
        TipoPrazo:
          type: string
          nullable: true
        TipoReporteHora:
          type: string
        Versao:
          type: string
        FormulariosCategorias:
          type: array
          nullable: true
          items:
            type: object
        FormularioOrigem:
          type: array
          description: Origens disponíveis para o formulário
          items:
            type: object
            properties:
              FormularioId:
                type: integer
              FormularioOrigemId:
                type: integer
              Descricao:
                type: string
        TipoControlaCusto:
          type: string
        TipoControlaHora:
          type: string
        TipoLocalizacao:
          type: string
        CategorizacaoAtividade:
          type: string
          nullable: true
        CopiarAssuntoTarefa:
          type: boolean
        Disponivel:
          type: boolean
        FiltrarTipoTarefa:
          type: boolean
        Ativo:
          type: boolean
          nullable: true
        DirecionaAtividade:
          type: boolean
        DirecionaArea:
          type: boolean
        RequerAprovacao:
          type: boolean
        IdFrmPapelAprovador:
          type: integer
          nullable: true

    IcVM:
      type: object
      properties:
        Id:
          type: integer
        Nome:
          type: string
        NomeCompleto:
          type: string
        Tipo:
          type: object
          properties:
            Id:
              type: integer
            Nome:
              type: string
        Classe:
          type: object
          properties:
            Id:
              type: integer
            Nome:
              type: string
        Status:
          type: object
          properties:
            Id:
              type: integer
            Nome:
              type: string

    Valor:
      type: object
      description: |
        Item de domínio usado em seleções, dropdowns e resultados de participantes.
        Atenção: `Id` é string (não integer) e o texto de exibição é `Texto` (não Nome).
        Para participantes, o campo `Id` contém um JSON serializado: `{"IdParticipante":123,"IdTipoPapel":1}`.
      properties:
        Id:
          type: string
          description: ID do valor (string). Para participantes, é JSON serializado com IdParticipante e IdTipoPapel.
        Texto:
          type: string
          description: Texto de exibição do valor
        Legenda:
          type: string
          nullable: true
          description: Legenda/tooltip opcional (pode conter HTML)
        IdDominioPai:
          type: string
          description: ID do domínio pai para seleções em cascata (vazio se não houver)

    ListaIcVM:
      type: object
      description: Lista de papéis de IC
      properties:
        Id:
          type: integer
        Nome:
          type: string

    AlteracoesMembros:
      type: object
      description: Alterações de membros de uma lista de papéis
      properties:
        Remover:
          type: array
          description: IDs dos membros a remover
          items:
            type: string
        Inserir:
          type: array
          description: IDs dos membros a inserir
          items:
            type: string

    # --- Supporting Types ---

    IntervaloDatas:
      type: object
      description: Intervalo de datas para filtros
      properties:
        Inicio:
          type: string
          format: date-time
        Fim:
          type: string
          format: date-time

    WMFiltroDadoAdicional:
      type: object
      description: Filtro por dado adicional
      properties:
        ValorFinal:
          type: string
        ValoresTexto:
          type: array
          items:
            type: string

    FiltroParticipante:
      type: object
      description: Filtro por participante (usado em busca avançada)
      properties:
        Participante:
          type: integer
        TipoPapel:
          type: integer

    PerguntaDataContract:
      type: object
      description: Pergunta da pesquisa de satisfação
      properties:
        Id:
          type: integer
        Texto:
          type: string
        Complemento:
          type: string
        Tipo:
          type: string
        IncluirComentario:
          type: boolean
        Obrigatoria:
          type: boolean
        PermitirAbstencao:
          type: boolean
        TipoOpcao:
          type: string
        RespostasPossiveis:
          type: array
          items:
            type: object
            properties:
              Id:
                type: integer
              Texto:
                type: string
              Peso:
                type: integer

    ConjuntoCampos:
      type: object
      description: Conjunto (seção) de campos de um formulário
      properties:
        Id:
          type: integer
          nullable: true
        Nome:
          type: string
          description: Nome de exibição do conjunto
        Chave:
          type: string
          description: Identificador único do conjunto (usado como chave nos payloads)
        Multiplo:
          type: boolean
          description: Se permite múltiplas instâncias (ex. tabela de itens)
        PermitirUpload:
          type: boolean
          description: Se permite upload de arquivos neste conjunto
        Condicoes:
          type: array
          nullable: true
          description: Condições de visibilidade do conjunto
          items:
            $ref: '#/components/schemas/Condicao'
        Posicao:
          type: integer
          description: Ordem de exibição do conjunto
        Visivel:
          type: boolean
          description: Se o conjunto é visível por padrão
        Dados_Adicionais_Excel:
          type: boolean
          description: Se permite importação de dados via Excel
        Campos:
          type: array
          items:
            $ref: '#/components/schemas/Campo'

    ConjuntoMesclado:
      type: object
      description: |
        Conjunto mesclado (ASK + Atendame) retornado por GET /v1/cardapio/{id}.
        Difere de ConjuntoCampos por incluir campos de ambas as fontes mesclados
        e preservar o campo Apresentacao nos campos. Estrutura idêntica a ConjuntoCampos.
      allOf:
        - $ref: '#/components/schemas/ConjuntoCampos'

    Campo:
      type: object
      description: |
        Campo de formulário dentro de um Conjunto. O tipo de apresentação visual é `Apresentacao`
        (TextBox, ComboBox, TextArea, ListBox, Calendar, Radio, CheckBox, CaixaDeTextoAutocomplete, DateHour).
        O tipo de dado subjacente é `TipoDeDado` (String, Date, Integer, Decimal, Boolean, Money, Text, Domain, Table, DateHour, etc.).
      properties:
        Nome:
          type: string
          description: Nome de exibição do campo
        Legenda:
          type: string
          description: Legenda/placeholder do campo
        Tamanho:
          type: string
          description: Tamanho máximo (em caracteres)
        Apresentacao:
          type: string
          nullable: true
          description: |
            Tipo de controle de UI. Valores possíveis:
            TextBox (1), ComboBox (2), TextArea (3), ListBox (4),
            Calendar (5), Radio (6), CheckBox (7),
            CaixaDeTextoAutocomplete (8), DateHour (10).
            Omitido do JSON quando null.
          enum: [TextBox, ComboBox, TextArea, ListBox, Calendar, Radio, CheckBox, CaixaDeTextoAutocomplete, DateHour]
        TipoDeDado:
          type: string
          description: |
            Tipo de dado subjacente. Valores possíveis:
            Char (1), Date (2), Integer (3), Decimal (4), Boolean (5),
            Money (6), Text (7), Domain (8), Table (9), Action (10),
            ListaDefinidaPeloUsuario (11), Procedure (12),
            ProcedureData (13), ProcedureMoney (14), DateHour (15).
          enum: [String, Date, Integer, Decimal, Boolean, Money, Text, Domain, Table, Action, ListaDefinidaPeloUsuario, Procedure, ProcedureData, ProcedureMoney, DateHour]
        Chave:
          type: string
          description: Identificador único do campo (usado como chave nos payloads)
        Obrigatoriedade:
          type: boolean
          description: Se o campo é obrigatório
        Modificar:
          type: boolean
          description: Se o campo é editável
        Condicional:
          type: boolean
          description: Se o campo tem visibilidade condicional
        DadoAdicionalId:
          type: integer
          nullable: true
          description: ID do dado adicional vinculado. Omitido do JSON quando null.
        Opcoes:
          nullable: true
          $ref: '#/components/schemas/Opcoes'
        BotoesDadosExternos:
          type: array
          nullable: true
          description: Botões de dados externos vinculados ao campo
          items:
            type: object
        AcaoDadoAdicional:
          type: array
          nullable: true
          description: Ações configuradas para o dado adicional
          items:
            type: object
        Valor:
          description: Valor padrão do campo (tipo varia conforme TipoDeDado). Para participantes pode ser JSON serializado.
          nullable: true
        Exemplo:
          type: string
          nullable: true
          description: Exemplo de preenchimento
        Validacao:
          type: string
          nullable: true
          description: Regra de validação (ex. regex, CPF, CNPJ, SONUM)
        MensagemObrigatoriedade:
          type: string
          description: Mensagem personalizada de obrigatoriedade
        ConjuntoItem:
          type: boolean
          description: Se o campo pertence a um item de conjunto múltiplo
        IntervaloData:
          type: string
          nullable: true
          description: Restrição de intervalo de data (ex. "futuro", "passado")
        Processo:
          type: boolean
          description: Se o campo é de processo

    Opcoes:
      type: object
      description: Configuração de opções para campos de seleção (ComboBox, ListBox, Radio, Search)
      properties:
        Url:
          type: string
          nullable: true
          description: URL para busca dinâmica de valores (pode conter `{termo}` como placeholder)
        Valores:
          type: array
          description: Valores pré-carregados
          items:
            $ref: '#/components/schemas/Valor'
        Multiplo:
          type: boolean
          description: Se permite seleção múltipla
        Condicao:
          nullable: true
          $ref: '#/components/schemas/Condicao'
        Dependencia:
          nullable: true
          $ref: '#/components/schemas/Dependencia'

    Condicao:
      type: object
      description: Condição de visibilidade ou filtro
      properties:
        Efeito:
          type: string
          description: Efeito a aplicar (ex. "Mostrar", "Ocultar")
        Valor:
          type: string
          description: Valor de comparação
        Intervalo:
          type: object
          nullable: true
          properties:
            Min:
              type: string
            Max:
              type: string
        Operador:
          type: string
          description: Operador de comparação
        Campo:
          type: string
          description: Chave do campo de referência
        Conjunto:
          type: string
          description: Chave do conjunto de referência

    Dependencia:
      type: object
      description: Dependência de campo pai para seleções em cascata
      properties:
        Campo:
          type: string
          description: Chave do campo pai
        URL:
          type: string
          description: URL para buscar valores filtrados pelo pai
        DominioPrecarregado:
          description: Domínio pré-carregado (pode ser objeto ou null)
          nullable: true
