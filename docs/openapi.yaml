      operationId: membrosDaListaDoIc
      x-source-controller: IcsController.MembrosDaListaDoIc
      parameters:
        - $ref: '#/components/parameters/IcId'
        - $ref: '#/components/parameters/ListaId'
      responses:
        '200':
          description: Membros
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestGenerico'
        '401':
          $ref: '#/components/responses/NaoAutorizado'
    post:
      tags: [Configuração]
      summary: Alterar membros de uma lista de papéis
      description: Adiciona ou remove membros de uma lista de papéis do IC.
      operationId: alterarMembrosDaListaDoIc
      x-source-controller: IcsController.AlterarMembrosDaListaDoIc
      parameters:
        - $ref: '#/components/parameters/IcId'
        - $ref: '#/components/parameters/ListaId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlteracoesMembros'
      responses:
        '200':
          description: Membros atualizados
          content:
            application/json:
              schema:
                type: object
        '406':
          $ref: '#/components/responses/ErroNegocio'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/consultas/{nome_consulta}:
    post:
      tags: [Configuração]
      summary: Executar consulta dinâmica
      description: |
        Executa uma consulta SQL pré-definida na tabela `ParametroAvancado` por nome.
        A consulta é carregada de `ConsultaSQLAPI/{nome_consulta}`.

        Parâmetros internos (ex: `usuarioid`) são injetados automaticamente e não
        podem ser sobrescritos pelo cliente. Demais parâmetros são passados no corpo
        da requisição como pares chave-valor.
      operationId: executarQuery
      x-source-controller: ConsultasController.ExecutarQuery
      parameters:
        - name: nome_consulta
          in: path
          required: true
          schema:
            type: string
          description: Nome da consulta registrada em ParametroAvancado
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Parâmetros SQL como pares chave-valor
      responses:
        '200':
          description: Resultados da consulta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoApiRestGenerico'
        '406':
          $ref: '#/components/responses/ErroNegocio'
        '401':
          $ref: '#/components/responses/NaoAutorizado'

  /v1/listaspapeisic:
    get:
      tags: [Configuração]
      summary: Listar todas as listas de papéis de IC
